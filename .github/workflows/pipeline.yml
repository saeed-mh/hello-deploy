name: CI/CD Pipeline

on:
  pull_request:

  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**."

  workflow_dispatch:

# Default permission for all jobs.
# Only the image-publishing job receives packages: write.
permissions:
  contents: read

concurrency:
  group: hello-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  quality:
    name: Lint, test, and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Run tests
        run: pytest --verbose

      - name: Validate Compose
        run: |
          cp .env.example .env
          docker compose \
            -f compose.yml \
            -f compose.local.yml \
            config --quiet

  container-test:
    name: Build and smoke-test container
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build test image
        run: |
          docker build \
            --build-arg GIT_SHA="${GITHUB_SHA}" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --tag hello-deploy:test \
            .

      - name: Start test container
        run: |
          docker run \
            --detach \
            --name hello-test \
            --publish 8000:8000 \
            hello-deploy:test

      - name: Smoke test real container
        run: |
          curl \
            --fail \
            --retry 12 \
            --retry-delay 2 \
            --retry-all-errors \
            http://127.0.0.1:8000/health

          curl \
            --fail \
            http://127.0.0.1:8000/version | \
            tee version.json

          jq \
            --exit-status \
            --arg expected "${GITHUB_SHA}" \
            '.version == $expected' \
            version.json

      - name: Show logs after failure
        if: failure()
        run: docker logs hello-test

      - name: Remove test container
        if: always()
        run: docker rm --force hello-test || true

