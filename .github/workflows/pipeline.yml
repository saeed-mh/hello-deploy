name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: hello-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  quality:
    name: Lint, test, and validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check app tests

      - name: Run tests
        run: pytest --verbose

      - name: Validate Compose
        run: |
          cp .env.example .env
          docker compose -f compose.yml -f compose.local.yml config --quiet

  container-test:
    name: Build and smoke-test container
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build test image
        run: |
          docker build \
            --build-arg GIT_SHA="${GITHUB_SHA}" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --tag hello-deploy:test \
            .

      - name: Start test container
        run: docker run --detach --name hello-test --publish 8000:8000 hello-deploy:test

      - name: Smoke test real container
        run: |
          curl --fail --retry 12 --retry-delay 2 --retry-all-errors http://127.0.0.1:8000/health
          curl --fail http://127.0.0.1:8000/version | tee version.json
          jq --exit-status --arg expected "${GITHUB_SHA}" '.version == $expected' version.json

      - name: Show logs after failure
        if: failure()
        run: docker logs hello-test

  publish-image:
    name: Publish immutable image
    runs-on: ubuntu-latest
    needs: container-test
    if: github.event_name != 'pull_request'
    outputs:
      image_repo: ${{ steps.image.outputs.repo }}
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Calculate lowercase image name
        id: image
        shell: bash
        run: |
          echo "repo=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
          echo "tag=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Build and push release image
        env:
          IMAGE_REPO: ${{ steps.image.outputs.repo }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          docker build \
            --build-arg GIT_SHA="${IMAGE_TAG}" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --tag "${IMAGE_REPO}:${IMAGE_TAG}" \
            .
          docker push "${IMAGE_REPO}:${IMAGE_TAG}"

  deploy-staging:
    name: Deploy staging
    runs-on: [self-hosted, Windows, X64]
    defaults:
      run:
        shell: bash
    needs: publish-image
    environment: staging
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy deployment files
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p /opt/hello-deploy/staging/deploy"

          scp -i ~/.ssh/deploy_key compose.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/hello-deploy/staging/compose.yml"

          scp -i ~/.ssh/deploy_key deploy/nginx.conf deploy/deploy.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/hello-deploy/staging/deploy/"

      - name: Deploy and verify health on host
        env:
          IMAGE_REPO: ${{ needs.publish-image.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.publish-image.outputs.image_tag }}
          FORCE_UNHEALTHY: ${{ vars.FORCE_UNHEALTHY }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd /opt/hello-deploy/staging && \
             chmod +x deploy/deploy.sh && \
             IMAGE_REPO='${IMAGE_REPO}' \
             IMAGE_TAG='${IMAGE_TAG}' \
             APP_ENV='staging' \
             PUBLIC_PORT='8080' \
             PROJECT_NAME='hello-staging' \
             FORCE_UNHEALTHY='${FORCE_UNHEALTHY:-false}' \
             ./deploy/deploy.sh"

      - name: Prove staging is the expected commit
        env:
          APPLICATION_URL: ${{ vars.APPLICATION_URL }}
          EXPECTED_SHA: ${{ needs.publish-image.outputs.image_tag }}
        run: |
          curl --fail --retry 12 --retry-delay 2 --retry-all-errors "${APPLICATION_URL}/health"
          curl --fail --silent "${APPLICATION_URL}/version" | tee version.json
          python -c "import json,sys; data=json.load(open('version.json', encoding='utf-8')); assert data['version'] == sys.argv[1], data" "${EXPECTED_SHA}"

  deploy-production:
    name: Approve and deploy production
    runs-on: [self-hosted, Windows, X64]
    defaults:
      run:
        shell: bash
    needs: [publish-image, deploy-staging]
    environment: production
    concurrency:
      group: hello-deploy-production
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Copy deployment files
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p /opt/hello-deploy/production/deploy"

          scp -i ~/.ssh/deploy_key compose.yml \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/hello-deploy/production/compose.yml"

          scp -i ~/.ssh/deploy_key deploy/nginx.conf deploy/deploy.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/hello-deploy/production/deploy/"

      - name: Deploy and verify health on host
        env:
          IMAGE_REPO: ${{ needs.publish-image.outputs.image_repo }}
          IMAGE_TAG: ${{ needs.publish-image.outputs.image_tag }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd /opt/hello-deploy/production && \
             chmod +x deploy/deploy.sh && \
             IMAGE_REPO='${IMAGE_REPO}' \
             IMAGE_TAG='${IMAGE_TAG}' \
             APP_ENV='production' \
             PUBLIC_PORT='80' \
             PROJECT_NAME='hello-production' \
             FORCE_UNHEALTHY='false' \
             ./deploy/deploy.sh"

      - name: Prove production is the expected commit
        env:
          APPLICATION_URL: ${{ vars.APPLICATION_URL }}
          EXPECTED_SHA: ${{ needs.publish-image.outputs.image_tag }}
        run: |
          curl --fail --retry 12 --retry-delay 2 --retry-all-errors "${APPLICATION_URL}/health"
          curl --fail --silent "${APPLICATION_URL}/version" | tee version.json
          python -c "import json,sys; data=json.load(open('version.json', encoding='utf-8')); assert data['version'] == sys.argv[1], data" "${EXPECTED_SHA}"
